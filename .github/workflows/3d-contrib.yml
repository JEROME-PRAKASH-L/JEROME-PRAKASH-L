name: Generate 3D Contribution Graph

on:
  # Refresh once a day
  schedule:
    - cron: "0 18 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Run on pushes to the default branch
  push:
    branches:
      - main
      - claude/github-readme-setup-uwu91c

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate the 3D contribution graph
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          USERNAME: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & push generated SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib
          git commit -m "chore: update 3D contribution graph" || echo "No changes to commit"
          git push
