<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-labelledby="title desc">
  <title id="title">Jerome Prakash L — AI engineer and software builder</title>
  <desc id="desc">A dark futuristic profile banner with cyan and blue accents, a monogram, and a code panel.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050816"/>
      <stop offset="0.55" stop-color="#0a1024"/>
      <stop offset="1" stop-color="#071624"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00f5d4"/>
      <stop offset="0.5" stop-color="#00b4d8"/>
      <stop offset="1" stop-color="#7b61ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#00d9ff" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#00d9ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#1b3151" stroke-width="1" stroke-opacity="0.32"/>
    </pattern>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="frame"><rect width="1200" height="340" rx="26"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="340" fill="url(#background)"/>
    <rect width="1200" height="340" fill="url(#grid)"/>
    <circle cx="1035" cy="60" r="250" fill="url(#glow)"/>
    <circle cx="170" cy="335" r="210" fill="url(#glow)" opacity="0.5"/>
    <path d="M0 289 C225 255 345 349 575 306 S975 246 1200 289" fill="none" stroke="url(#accent)" stroke-width="2" stroke-opacity="0.35"/>
    <path d="M0 304 C240 270 355 364 590 320 S980 261 1200 305" fill="none" stroke="#00f5d4" stroke-width="1" stroke-opacity="0.15"/>

    <g transform="translate(74 62)">
      <circle cx="88" cy="100" r="76" fill="#081323" stroke="url(#accent)" stroke-width="3"/>
      <circle cx="88" cy="100" r="59" fill="none" stroke="#00f5d4" stroke-width="1" stroke-dasharray="5 8" opacity="0.42"/>
      <circle cx="88" cy="100" r="5" fill="#00f5d4" filter="url(#softGlow)"/>
      <text x="88" y="113" text-anchor="middle" fill="#f8fbff" font-size="39" font-weight="800" font-family="Segoe UI, Arial, sans-serif" letter-spacing="2">JPL</text>
      <circle cx="146" cy="48" r="5" fill="#7b61ff"/>
      <circle cx="28" cy="145" r="4" fill="#00b4d8"/>
    </g>

    <g transform="translate(260 79)" font-family="Segoe UI, Arial, sans-serif">
      <text x="0" y="38" fill="#8b9bb4" font-size="16" font-weight="600" letter-spacing="5">HELLO, I AM</text>
      <text x="0" y="98" fill="#f8fbff" font-size="48" font-weight="800" letter-spacing="1">JEROME PRAKASH L</text>
      <rect x="0" y="119" width="385" height="4" rx="2" fill="url(#accent)"/>
      <text x="0" y="160" fill="#00f5d4" font-size="21" font-weight="650">AI ENGINEER · AUTOMATION BUILDER</text>
      <text x="0" y="193" fill="#aab8cc" font-size="18">Turning ambitious ideas into useful software.</text>
    </g>

    <g transform="translate(870 75)" font-family="Consolas, monospace">
      <rect width="270" height="190" rx="14" fill="#060b16" stroke="#203453" stroke-width="1.5"/>
      <rect width="270" height="35" rx="14" fill="#0c1526"/>
      <path d="M0 35H270" stroke="#203453"/>
      <circle cx="20" cy="18" r="5" fill="#ff5f57"/>
      <circle cx="38" cy="18" r="5" fill="#febc2e"/>
      <circle cx="56" cy="18" r="5" fill="#28c840"/>
      <text x="82" y="23" fill="#64748b" font-size="12">profile.py</text>
      <text x="20" y="63" fill="#7b8ba3" font-size="13">01</text>
      <text x="49" y="63" fill="#7b61ff" font-size="13">builder</text>
      <text x="102" y="63" fill="#d8e4f2" font-size="13">= {</text>
      <text x="20" y="88" fill="#7b8ba3" font-size="13">02</text>
      <text x="49" y="88" fill="#00f5d4" font-size="13">  "focus"</text>
      <text x="112" y="88" fill="#d8e4f2" font-size="13">:</text>
      <text x="127" y="88" fill="#ffd166" font-size="13">"AI agents"</text>
      <text x="20" y="113" fill="#7b8ba3" font-size="13">03</text>
      <text x="49" y="113" fill="#00f5d4" font-size="13">  "mode"</text>
      <text x="104" y="113" fill="#d8e4f2" font-size="13">:</text>
      <text x="119" y="113" fill="#ffd166" font-size="13">"build"</text>
      <text x="20" y="138" fill="#7b8ba3" font-size="13">04</text>
      <text x="49" y="138" fill="#00f5d4" font-size="13">  "status"</text>
      <text x="112" y="138" fill="#d8e4f2" font-size="13">:</text>
      <text x="127" y="138" fill="#ffd166" font-size="13">"learning"</text>
      <text x="20" y="163" fill="#7b8ba3" font-size="13">05</text>
      <text x="49" y="163" fill="#d8e4f2" font-size="13">}</text>
      <rect x="62" y="176" width="8" height="2" fill="#00f5d4"/>
    </g>
  </g>
  <rect x="1.5" y="1.5" width="1197" height="337" rx="24.5" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.65"/>
</svg>
